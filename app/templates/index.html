<!DOCTYPE html>
<html>
<head>

    <title>AI Phishing Detection System</title>

    <style>

        body{
            background:#071330;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        h1{
            margin-bottom:25px;
        }

        textarea{
            width:100%;
            height:250px;
            padding:15px;
            font-size:20px;
            border-radius:10px;
            border:none;
        }

        button{
            margin-top:20px;
            padding:15px 30px;
            background:#1fd655;
            border:none;
            color:white;
            font-size:20px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#15b347;
        }

        .result-box{
            margin-top:40px;
            background:#1a2742;
            padding:30px;
            border-radius:10px;
        }

        .danger{
            color:#ff4d4d;
            font-size:34px;
            font-weight:bold;
        }

        .safe{
            color:#4dff88;
            font-size:34px;
            font-weight:bold;
        }

        .score{
            margin-top:20px;
            font-size:24px;
        }

    </style>

</head>

<body>

    <h1>🛡️ AI Phishing Email Detection</h1>

    <form method="POST">

        <textarea
            name="email"
            placeholder="Paste suspicious email here..."
        >{{ email }}</textarea>

        <br>

        <button type="submit">
            Analyze Email
        </button>

    </form>

    {% if result %}

    <div class="result-box">

        <h2>Prediction Result</h2>

        {% if result == "phishing" %}

            <div class="danger">
                ⚠️ PHISHING EMAIL DETECTED
            </div>

        {% else %}

            <div class="safe">
                ✅ SAFE EMAIL
            </div>

        {% endif %}

        <div class="score">
            Confidence Score: {{ score }}%
        </div>

    </div>

    {% endif %}

</body>
</html>
